<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Provider Vetting Checklist</title>
<style>body{font-family:Arial;background:#F6F2EA;color:#26332E;max-width:640px;margin:30px auto;padding:0 16px}
h2{font-family:Georgia,serif}.card{background:#FFFDF9;border:1px solid #E4DDCE;border-radius:12px;padding:16px;margin:12px 0}
label{display:flex;gap:10px;align-items:flex-start;margin:9px 0;font-size:14.5px;cursor:pointer}
input[type=checkbox]{width:18px;height:18px;margin-top:1px}
input[type=text],textarea{width:100%;padding:9px;border:1px solid #E4DDCE;border-radius:8px;box-sizing:border-box;font-family:inherit}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:1.5px;color:#8F6A24;text-transform:uppercase;margin-bottom:4px}
.btn{background:#26332E;color:#F6F2EA;border:0;border-radius:9px;padding:10px 16px;font-weight:700;margin-right:8px;cursor:pointer}
.brass{background:#8F6A24}#score{font-family:Georgia,serif;font-size:20px}
@media print{.btn,select,#provSel{display:none}}</style></head><body>
<h2>🕊 Preferred Provider Vetting</h2>
<div class="card"><div class="eyebrow">Provider</div>
<input type="text" id="pname" placeholder="Business name" oninput="save()">
<div style="display:flex;gap:8px;margin-top:8px"><input type="text" id="pcat" placeholder="Category" oninput="save()"><input type="text" id="parea" placeholder="City/State" oninput="save()"></div></div>
<div id="secs"></div>
<div class="card"><div class="eyebrow">Notes & references</div><textarea id="pnotes" rows="4" placeholder="Reference calls, red flags, pricing position…" oninput="save()"></textarea>
<div style="margin-top:10px" id="score"></div></div>
<button class="btn" onclick="window.print()">Print / PDF</button>
<button class="btn brass" onclick="if(confirm('Clear this provider?')){localStorage.removeItem(key());location.reload()}">Clear</button>
<script>
const SECS=[["Licensed & verified",["State license current (looked up, not just claimed)","Liability insurance confirmed where the trade requires it","Business registered / real address & phone verified"]],
["Transparent pricing",["Provided a written, itemized quote on request","Prices honored as given in a test interaction","No pattern of surprise-charge complaints in reviews (3+ mentions = decline)"]],
["Dignity in grief",["Reference from clergy, funeral director, or a served family checked","Reviews read for PATTERNS, not incidents","Team conduct appropriate for grieving families (test call impression)"]],
["Responsiveness",["Answered or returned first contact within one business day","Confirms details in writing","Can deliver on funeral timelines (right building, right day — asked directly)"]],
["Decision",["APPROVE — send the approval letter from the Acceptance Sender"]]];
function key(){return "vet_"+(document.getElementById("pname").value.trim().toLowerCase()||"draft")}
function render(){const d=JSON.parse(localStorage.getItem(key())||"{}");
 secs.innerHTML=SECS.map((s,i)=>`<div class="card"><div class="eyebrow">${s[0]}</div>${s[1].map((c,j)=>
 `<label><input type="checkbox" data-i="${i}-${j}" ${d["c"+i+"-"+j]?"checked":""} onchange="save()"> ${c}</label>`).join("")}</div>`).join("");
 ["pcat","parea","pnotes"].forEach(id=>{if(d[id])document.getElementById(id).value=d[id]});
 tally();}
function save(){const d={pcat:pcat.value,parea:parea.value,pnotes:pnotes.value};
 document.querySelectorAll("input[type=checkbox]").forEach(cb=>d["c"+cb.dataset.i]=cb.checked);
 localStorage.setItem(key(),JSON.stringify(d)); tally();}
function tally(){const cbs=[...document.querySelectorAll("input[type=checkbox]")];
 const req=cbs.slice(0,-1), done=req.filter(c=>c.checked).length;
 score.textContent=done+" / "+req.length+" standards met"+(done===req.length?" — ready to approve ✅":"");}
render(); pname.addEventListener("input",render);
</script></body></html>
